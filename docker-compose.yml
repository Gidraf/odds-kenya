version: "3.9"

# -----------------------------------------------------------------------------
# Redis URL (percent‑encoded password)
# -----------------------------------------------------------------------------
x-redis-url: &redis-url "redis://:%40Winners1127@host.docker.internal:6382/0"

# -----------------------------------------------------------------------------
# Common environment variables for all services
# -----------------------------------------------------------------------------
x-common-env: &common-env
  REDIS_URL: *redis-url
  REDIS_HOST: redis6382
  REDIS_PORT: "6382"
  REDIS_AUTH: "@Winners1127"
  DB_NAME: oddkenya
  DB_HOST: host.docker.internal
  DB_PORT: "5432"
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  STORAGE_ENDPOINT: 5.78.137.59:6500
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
  LOG_DIR: /app/logs

services:

  # -------------------------------------------------------------------------
  # Flask Web Application (Gunicorn) – live pollers enabled
  # -------------------------------------------------------------------------
  web:
    build: .
    restart: always
    command: gunicorn -k gevent -w 4 -b 0.0.0.0:5000 run:flask_app
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      ENABLE_HARVESTER: "1"              # starts live pollers only here

  # -------------------------------------------------------------------------
  # Celery Worker (no beat, no live pollers)
  # -------------------------------------------------------------------------
  celery-worker:
    build: .
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --queues=harvest,live,results,notify,ev_arb,default
      --concurrency=4
      --loglevel=info
      --logfile=/app/logs/celery-worker.log
      --hostname=worker@%h
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      CELERY_INLINE: "0"

  # -------------------------------------------------------------------------
  # Celery Beat (scheduler only)
  # -------------------------------------------------------------------------
  celery-beat:
    build: .
    restart: always
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --logfile=/app/logs/celery-beat.log
      --scheduler celery.beat:PersistentScheduler
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env

  # -------------------------------------------------------------------------
  # Celery Analytics Worker (low concurrency for Playwright)
  # -------------------------------------------------------------------------
  celery-analytics:
    build: .
    restart: always
    command: >
      sh -c "rm -f celerybeat-schedule* && celery -A app.workers.celery_app worker
      --queues=analytics
      --concurrency=2
      --loglevel=info
      --logfile=/app/logs/celery-analytics.log
      --hostname=analytics@%h"
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

  # -------------------------------------------------------------------------
  # Redis (with password and persistence)
  # -------------------------------------------------------------------------
  redis6382:
    image: redis:7
    container_name: redis6382
    restart: always
    command: >
      redis-server
        --port 6382
        --requirepass "@Winners1127"
        --save 60 1
        --loglevel warning
    ports:
      - "6382:6382"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6382 -a '@Winners1127' ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # -------------------------------------------------------------------------
  # Nginx Load Balancer / Reverse Proxy
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    restart: always
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  app-logs: