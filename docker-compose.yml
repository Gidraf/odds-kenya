version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Build the Redis URL once here so every service uses the same string.
# Password @Winners1127 is percent-encoded (%40Winners1127) in the URL.
# ─────────────────────────────────────────────────────────────────────────────
x-redis-url: &redis-url "redis://:%40Winners1127@redis6382:6382/0"

x-common-env: &common-env
  REDIS_URL: *redis-url
  REDIS_HOST: redis6382
  REDIS_PORT: "6382"
  REDIS_AUTH: "@Winners1127"
  DB_NAME: oddkenya
  # Hardcoded — never reads DB_HOST from .env (which is often "localhost").
  # Inside Docker, "localhost" = the container itself. host.docker.internal
  # resolves to the actual host machine via the extra_hosts entry below.
  DB_HOST: host.docker.internal
  DB_PORT: "5432"
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  STORAGE_ENDPOINT: 5.78.137.59:6500
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}

services:

  # ── API ───────────────────────────────────────────────────────────────────
  web:
    build: .
    restart: always
    # Port mapping is handled by Nginx — do NOT expose 5000 directly.
    command: gunicorn -k gevent -w 4 -b 0.0.0.0:5000 run:flask_app
    # env_file loads first; environment: values override any conflicting keys.
    # This means DB_HOST=localhost in .env is safely overridden by
    # DB_HOST=host.docker.internal in the environment block below.
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
    # deploy: replicas only works in Docker Swarm.
    # For regular Compose use:  docker compose up --scale web=8
    # (or uncomment the block below to pin a count without Swarm)
    # -------------------------------------------------------------------------
    # deploy:
    #   replicas: 8   # ← Swarm-only; ignored by plain docker compose
    # -------------------------------------------------------------------------

  # ── Celery worker (commented out until needed) ────────────────────────────
  # celery:
  #   build: .
  #   restart: always
  #   command: celery -A app.services.message_services worker -c 8 -l debug
  #   env_file: .env
  #   networks:
  #     - app-network
  #   depends_on:
  #     redis6382:
  #       condition: service_healthy
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ./chroma_db:/app/chroma_db
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   environment:
  #     <<: *common-env

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis6382:
    image: redis:7
    container_name: redis6382
    restart: always
    command: >
      redis-server
        --port 6382
        --requirepass "@Winners1127"
        --save 60 1
        --loglevel warning
    ports:
      - "6382:6382"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6382 -a '@Winners1127' ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Nginx load-balancer ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    restart: always
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:        # persist Redis data across restarts