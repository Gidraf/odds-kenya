version: "3.9"

x-celery-common: &celery-common
  build: .
  restart: unless-stopped
  depends_on:
    redis6382:
      condition: service_healthy
  environment: &celery-env
    FLASK_APP: run.py
    FLASK_ENV: production
    SECRET_KEY: ${SECRET_KEY}
    DATABASE_URL: ${DATABASE_URL}
    JWT_PRIVATE_KEY_PEM: ${JWT_PRIVATE_KEY_PEM}
    JWT_PUBLIC_KEY_PEM:  ${JWT_PUBLIC_KEY_PEM}
    RESPONSE_SIGNING_SECRET: ${RESPONSE_SIGNING_SECRET}

    # Redis — use Docker service name "redis6382" (not host.docker.internal)
    # Password has NO @ prefix → no %40 encoding needed
    REDIS_URL:        "redis://:${REDIS_PASSWORD}@redis6382:6382/0"
    REDIS_CACHE_URL:  "redis://:${REDIS_PASSWORD}@redis6382:6382/2"
    REDIS_HOST:       "redis6382"
    REDIS_PORT:       "6382"
    REDIS_PASSWORD:   "${REDIS_PASSWORD}"
    REDIS_DB:         "0"

    CELERY_BROKER_URL:     "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@host.docker.internal:5672/kinetic"
    CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@redis6382:6382/1"

    MINIO_ENDPOINT:   ${MINIO_ENDPOINT:-host.docker.internal:6500}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_SECURE:     "false"

    ENABLE_HARVESTER: "0"
    TZ: Africa/Nairobi

  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - kinetic

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis6382:
    image: redis:7
    container_name: redis6382
    restart: unless-stopped
    command: >
      redis-server
      --port 6382
      --requirepass ${REDIS_PASSWORD}
      --save 60 1000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --notify-keyspace-events "Ex"
    ports:
      - "6382:6382"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kinetic

  # ── Web ────────────────────────────────────────────────────────────────────
  web:
    <<: *celery-common
    container_name: odds-kenya-web-1
    build: .
    command: >
      gunicorn -k gevent -w 1 -b 0.0.0.0:5000
      --timeout 300
      --keep-alive 5
      --worker-connections 1000
      --log-level info
      --worker-tmp-dir /tmp
      run:flask_app
    expose:
      - "5000"
    environment:
      <<: *celery-env
      ENABLE_HARVESTER: "0"
    # Healthcheck disabled until /health is registered in Flask
    # Re-enable after copying health_blueprint.py into app/api/health.py
    healthcheck:
      test: ["CMD-SHELL", "true"]
      interval: 10s
      timeout: 5s
      retries: 1
      start_period: 5s

  # ── Nginx LB ───────────────────────────────────────────────────────────────
  nginx_lb:
    image: nginx:alpine
    container_name: nginx_lb
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # KEY FIX: only wait for web to START, not be healthy
    # This means nginx_lb comes up immediately even if /health doesn't exist yet
    depends_on:
      - web
    networks:
      - kinetic

  # ── Flower ─────────────────────────────────────────────────────────────────
  flower:
    <<: *celery-common
    container_name: kinetic-flower
    command: >
      celery -A app.workers.celery_app flower
      --broker=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@host.docker.internal:5672/kinetic
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASS:-flower_pass}
      --url_prefix=flower
      --persistent=true
      --db=/tmp/flower.db
    ports:
      - "5555:5555"

  # ── Celery: Harvest ────────────────────────────────────────────────────────
  celery-harvest:
    <<: *celery-common
    container_name: odds-kenya-celery-harvest-1
    command: >
      celery -A app.workers.celery_app worker
      --queues=harvest,live
      --concurrency=8
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --loglevel=info
      --hostname=harvest@%h

  # ── Celery: Results ────────────────────────────────────────────────────────
  celery-results:
    <<: *celery-common
    container_name: odds-kenya-celery-results-1
    command: >
      celery -A app.workers.celery_app worker
      --queues=results,ev_arb,notify
      --concurrency=6
      --prefetch-multiplier=2
      --max-tasks-per-child=500
      --loglevel=info
      --hostname=results@%h

  # ── Celery: Analytics ──────────────────────────────────────────────────────
  celery-analytics:
    <<: *celery-common
    container_name: odds-kenya-celery-analytics-1
    command: >
      celery -A app.workers.celery_app worker
      --queues=analytics
      --concurrency=2
      --prefetch-multiplier=1
      --max-tasks-per-child=50
      --loglevel=info
      --hostname=analytics@%h

  # ── Celery: Beat ───────────────────────────────────────────────────────────
  celery-beat:
    <<: *celery-common
    container_name: odds-kenya-celery-beat-1
    command: >
      sh -c "rm -f /app/celerybeat.pid &&
             celery -A app.workers.celery_app beat
             --loglevel=info
             --scheduler celery.beat:Scheduler"
    healthcheck:
      test: ["CMD", "pgrep", "-f", "celery.*beat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  redis_data:

networks:
  kinetic:
    driver: bridge