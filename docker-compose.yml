version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Kinetic Odds Engine
# RabbitMQ runs on the HOST machine (not in Docker).
# All containers reach it via host.docker.internal.
# ─────────────────────────────────────────────────────────────────────────────

x-celery-common: &celery-common
  build: .
  restart: unless-stopped
  depends_on:
    redis6382:
      condition: service_healthy
  environment: &celery-env
    FLASK_APP: run.py
    FLASK_ENV: production
    SECRET_KEY: ${SECRET_KEY}
    DATABASE_URL: ${DATABASE_URL}

    # Redis — cache + pubsub only
    REDIS_URL: "redis://:${REDIS_PASSWORD}@host.docker.internal:6382/0"
    REDIS_CACHE_URL: "redis://:${REDIS_PASSWORD}@host.docker.internal:6382/2"

    # RabbitMQ — running on host machine, NOT in Docker
    CELERY_BROKER_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@host.docker.internal:5672/kinetic"
    CELERY_RESULT_BACKEND: "redis://:${REDIS_PASSWORD}@host.docker.internal:6382/1"

    # MinIO
    MINIO_ENDPOINT: ${MINIO_ENDPOINT:-host.docker.internal:6500}
    MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
    MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    MINIO_SECURE: "false"

    ENABLE_HARVESTER: "0"
    TZ: Africa/Nairobi

  extra_hosts:
    - "host.docker.internal:host-gateway"
  networks:
    - kinetic

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis6382:
    image: redis:7
    container_name: redis6382
    restart: unless-stopped
    command: >
      redis-server
      --port 6382
      --requirepass ${REDIS_PASSWORD}
      --save 60 1000
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --notify-keyspace-events "Ex"
    ports:
      - "6382:6382"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6382", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kinetic

  # ── Flower (connects to host RabbitMQ) ─────────────────────────────────────
  flower:
    <<: *celery-common
    container_name: kinetic-flower
    command: >
      celery -A app.workers.celery_app flower
      --broker=amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@host.docker.internal:5672/kinetic
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASS:-flower_pass}
      --url_prefix=flower
      --persistent=true
      --db=/tmp/flower.db
    ports:
      - "5555:5555"
    restart: unless-stopped

  # ── Web ────────────────────────────────────────────────────────────────────
  web:
    <<: *celery-common
    container_name: odds-kenya-web-1
    build: .
    command: >
      gunicorn -k gevent -w 1 -b 0.0.0.0:5000
      --timeout 300
      --keep-alive 5
      --worker-connections 1000
      --log-level info
      --worker-tmp-dir /tmp
      run:flask_app
    expose:
      - "5000"
    environment:
      <<: *celery-env
      ENABLE_HARVESTER: "0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery: Harvest ────────────────────────────────────────────────────────
  celery-harvest:
    <<: *celery-common
    container_name: odds-kenya-celery-harvest-1
    command: >
      celery -A app.workers.celery_app worker
      --queues=harvest,live
      --concurrency=8
      --prefetch-multiplier=1
      --max-tasks-per-child=200
      --loglevel=info
      --hostname=harvest@%h
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping", "-d", "harvest@%h"]
      interval: 30s
      timeout: 15s
      retries: 3

  # ── Celery: Results ────────────────────────────────────────────────────────
  celery-results:
    <<: *celery-common
    container_name: odds-kenya-celery-results-1
    command: >
      celery -A app.workers.celery_app worker
      --queues=results,ev_arb,notify
      --concurrency=6
      --prefetch-multiplier=2
      --max-tasks-per-child=500
      --loglevel=info
      --hostname=results@%h

  # ── Celery: Analytics ──────────────────────────────────────────────────────
  celery-analytics:
    <<: *celery-common
    container_name: odds-kenya-celery-analytics-1
    command: >
      celery -A app.workers.celery_app worker
      --queues=analytics
      --concurrency=2
      --prefetch-multiplier=1
      --max-tasks-per-child=50
      --loglevel=info
      --hostname=analytics@%h

  # ── Celery: Beat ───────────────────────────────────────────────────────────
  celery-beat:
    <<: *celery-common
    container_name: odds-kenya-celery-beat-1
    command: >
      sh -c "rm -f /app/celerybeat.pid &&
             celery -A app.workers.celery_app beat
             --loglevel=info
             --scheduler celery.beat:PersistentScheduler
             --schedule /tmp/celerybeat-schedule"
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/celerybeat-schedule"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── Next.js ────────────────────────────────────────────────────────────────
  webapp-nextjs:
    image: odds-kenya-webapp-nextjs
    container_name: kinetic-web
    restart: unless-stopped
    ports:
      - "3050:3050"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://kinetic-api.gidraf.dev/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-wss://kinetic-api.gidraf.dev}
    networks:
      - kinetic

  # ── Nginx ──────────────────────────────────────────────────────────────────
  nginx_lb:
    image: nginx:alpine
    container_name: nginx_lb
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - kinetic

volumes:
  redis_data:

networks:
  kinetic:
    driver: bridge