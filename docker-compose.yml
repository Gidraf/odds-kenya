version: "3.9"

x-redis-url: &redis-url "redis://:%40Winners1127@host.docker.internal:6382/0"

x-common-env: &common-env
  REDIS_URL: *redis-url
  REDIS_CACHE_URL: "redis://:%40Winners1127@host.docker.internal:6382/2"
  CELERY_RESULT_BACKEND: "redis://:%40Winners1127@host.docker.internal:6382/1"
  REDIS_HOST: host.docker.internal
  REDIS_PORT: "6382"
  REDIS_AUTH: "@Winners1127"
  DB_NAME: oddkenya
  DB_HOST: host.docker.internal
  DB_PORT: "5432"
  DB_USER: ${DB_USER}
  DB_PASSWORD: ${DB_PASSWORD}
  STORAGE_ENDPOINT: 5.78.137.59:6500
  STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
  STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
  LOG_DIR: /app/logs

services:

  web:
    build: .
    restart: always
    command: gunicorn -k gevent -w 1 -b 0.0.0.0:5000 run:flask_app
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      ENABLE_HARVESTER: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  celery-worker:
    build: .
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --queues=harvest,live,default
      --concurrency=6
      --loglevel=info
      --logfile=/app/logs/celery-worker.log
      --hostname=worker-harvest@%h
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      CELERY_INLINE: "0"

  celery-worker-results:
    build: .
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --queues=results,ev_arb,notify
      --concurrency=8
      --loglevel=info
      --logfile=/app/logs/celery-worker-results.log
      --hostname=worker-results@%h
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      CELERY_INLINE: "0"

  celery-beat:
    build: .
    restart: always
    command: >
      sh -c "rm -f /app/celerybeat-schedule* &&
      celery -A app.workers.celery_app beat
      --loglevel=info
      --logfile=/app/logs/celery-beat.log
      --scheduler celery.beat:PersistentScheduler
      --pidfile=/app/logs/celerybeat.pid"
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env

  celery-analytics:
    build: .
    restart: always
    command: >
      celery -A app.workers.celery_app worker
      --queues=analytics
      --concurrency=2
      --loglevel=info
      --logfile=/app/logs/celery-analytics.log
      --hostname=analytics@%h
    env_file: .env
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - app-logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

  redis6382:
    image: redis:7
    container_name: redis6382
    restart: always
    command: >
      redis-server
        --port 6382
        --requirepass "@Winners1127"
        --save 60 1
        --loglevel warning
    ports:
      - "6382:6382"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6382 -a '@Winners1127' ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    restart: always
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  redis-data:
  app-logs: