version: "3.9"

services:
  web:
    build: .
    restart: always
    # NO PORT MAPPING HERE! Nginx handles the outside world on port 5050.
    command: gunicorn -k gevent -w 4 -b 0.0.0.0:5000 run:app
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    depends_on:
      redis6382:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_HOST=redis6382
      - REDIS_PORT=6382
      - REDIS_AUTH=@Winners1127
      # External DB Variables
      - DB_NAME=oddkenya
      - DB_HOST=${DB_HOST:-host.docker.internal} # Points outside docker
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      # External MinIO Variables
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-host.docker.internal:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    deploy:
      replicas: 8 # Automatically boots 8 instances of your API

  # celery:
  #   build: .
  #   restart: always
  #   command: celery -A app.services.message_services worker -c 8 -l debug
  #   env_file: .env
  #   networks:
  #     - app-network
  #   depends_on:
  #     redis6382:
  #       condition: service_healthy
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #     - ./chroma_db:/app/chroma_db
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   environment:
  #     - REDIS_HOST=redis6382
  #     - REDIS_PORT=6382
  #     - REDIS_AUTH=@Winners1127
  #     - DB_NAME=oddkenya
  #     - DB_HOST=${DB_HOST:-host.docker.internal}
  #     - DB_PORT=${DB_PORT:-5432}
  #     - DB_USER=${DB_USER}
  #     - DB_PASSWORD=${DB_PASSWORD}
  #     - MINIO_ENDPOINT=${MINIO_ENDPOINT:-host.docker.internal:9000}
  #     - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
  #     - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

  redis6382:
    image: redis:7
    container_name: redis6382
    restart: always
    command: >
      sh -c "redis-server --port 6382 --requirepass '@Winners1127'"
    ports:
      - "6382:6382"
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6382 -a '@Winners1127' ping | grep PONG"]
      interval: 3s
      timeout: 10s
      retries: 10

  nginx:
    image: nginx:alpine
    container_name: nginx_lb
    restart: always
    ports:
      - "5050:5050"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge