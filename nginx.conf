# nginx.conf — runs INSIDE the nginx_lb Docker container
# Listens on :5050, proxies to the web container by Docker DNS name

server {
    listen 5050;
    server_name _;

    # Required for SSE / long-polling
    proxy_buffering        off;
    proxy_cache            off;
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    proxy_connect_timeout  10s;
    proxy_http_version     1.1;

    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection        "";   # keepalive to upstream

    # Health check — fast, no logging
    location /health {
        proxy_pass http://web:5000;
        access_log off;
    }

    # SSE endpoints — extra-long timeout, no buffering
    location ~ ^/api/odds/stream/ {
        proxy_pass         http://web:5000;
        proxy_buffering    off;
        proxy_read_timeout 7200s;
        add_header         X-Accel-Buffering no;
        proxy_set_header   Connection "";
    }

    location ~ ^/api/matches/notifications/stream {
        proxy_pass         http://web:5000;
        proxy_buffering    off;
        proxy_read_timeout 7200s;
        add_header         X-Accel-Buffering no;
        proxy_set_header   Connection "";
    }

    # All other routes
    location / {
        proxy_pass http://web:5000;
    }
}